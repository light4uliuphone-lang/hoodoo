<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title | default: "四月老師 - 魔法課程中心" }}{% endif %}</title>

    <meta name="description" content="{{ page.description | default: site.description }}">

    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:type" content="website">

    <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo"><a href="{{ '/' | relative_url }}" style="text-decoration: none; color: inherit;">四月老師</a></div>
        <ul class="nav-menu">
            <li><a href="{{ '/' | relative_url }}">首頁</a></li>
            <li><a href="{{ '/course/' | relative_url }}">課程中心</a></li>
            <li><a href="{{ '/rituals/' | relative_url }}">儀式與服務</a></li>
            <li><a href="{{ '/blog/' | relative_url }}">部落格</a></li>
            <li><a href="{{ '/about/' | relative_url }}">關於我們</a></li>
        </ul>
    </div>
</nav>

<main>
    {{ content }}
</main>

<footer class="footer">
    <div class="container">
        <p>&copy; {{ "now" | date: "%Y" }} 四月老師 - 魔法課程中心。版權所有。</p>
        <p>報名方式：<a href="mailto:{{ site.email | default: 'herbmagic@hotmail.com.tw' }}">{{ site.email | default: 'herbmagic@hotmail.com.tw' }}</a></p>
    </div>
</footer>

<script src="{{ '/js/main.js' | relative_url }}"></script>
</body>
</html>
