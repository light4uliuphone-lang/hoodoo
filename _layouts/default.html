<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
    <style>
        /* 1. 導覽列佈局 */
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 10px 20px; }
        .nav-menu { display: flex; list-style: none; gap: 20px; margin: 0; padding: 0; }
        .nav-menu a { text-decoration: none; color: #fff; font-weight: bold; }

        /* 2. 搜尋框容器 */
        .search-wrapper { position: relative; }
        #search-input { 
            padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; 
            width: 160px; outline: none; transition: 0.3s;
        }
        #search-input:focus { width: 220px; border-color: #ff9800; }

        /* 3. 搜尋結果彈出視窗 - 這是關鍵 */
        #results-container {
            position: absolute; top: 45px; right: 0; width: 320px; 
            background: white; border-radius: 8px; box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            list-style: none; padding: 0; margin: 0; z-index: 99999;
            max-height: 400px; overflow-y: auto; 
            display: none; /* 平時隱藏 */
        }
        #results-container li { border-bottom: 1px solid #eee; }
        #results-container li a { 
            display: block; padding: 15px; color: #333; 
            text-decoration: none; font-size: 0.95rem; line-height: 1.5;
        }
        #results-container li a:hover { background: #f0f7f7; color: #1a5f5f; }
    </style>
</head>
<body>

<nav class="navbar" style="background: #1a5f5f; color: white;">
    <div class="nav-container">
        <div class="logo" style="font-size: 1.5rem; font-weight: bold;">四月老師</div>
        
        <ul class="nav-menu">
            <li><a href="{{ '/' | relative_url }}">首頁</a></li>
            <li><a href="{{ '/course/' | relative_url }}">課程中心</a></li>
            <li><a href="{{ '/blog/index.html' | relative_url }}">部落格</a></li>
            <li><a href="{{ '/about/' | relative_url }}">關於我們</a></li>
        </ul>

        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="搜尋文章..." autocomplete="off">
            <ul id="results-container"></ul>
        </div>
    </div>
</nav>

<main>{{ content }}</main>

<footer style="text-align: center; padding: 40px 0; border-top: 1px solid #eee; margin-top: 50px;">
    <p>&copy; 2026 四月老師 - 魔法課程中心</p>
</footer>

<script src="https://unpkg.com/simple-jekyll-search@latest/dest/simple-jekyll-search.min.js"></script>

<script>
    // 2. 初始化搜尋
    var sjs = SimpleJekyllSearch({
        searchInput: document.getElementById('search-input'),
        resultsContainer: document.getElementById('results-container'),
        json: '/search.json', // 這裡直接用根目錄路徑，最穩
        searchResultTemplate: '<li><a href="{url}">{title}</a></li>',
        noResultsText: '<li style="padding:15px; color:#999;">找不到相關文章</li>'
    });

    // 3. 讓結果框動起來
    var inputField = document.getElementById('search-input');
    var resultsList = document.getElementById('results-container');

    inputField.addEventListener('input', function() {
        if (this.value.length > 0) {
            resultsList.style.display = 'block'; // 有字就顯示
        } else {
            resultsList.style.display = 'none'; // 沒字就消失
        }
    });

    // 4. 按 Enter 鍵跳轉到第一個搜尋結果
    inputField.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            var firstLink = resultsList.querySelector('a');
            if (firstLink) {
                window.location.href = firstLink.href;
            }
        }
    });

    // 5. 點擊旁邊自動關閉結果框
    document.addEventListener('click', function(e) {
        if (e.target !== inputField) {
            resultsList.style.display = 'none';
        }
    });
</script>

</body>
</html>
