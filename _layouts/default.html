<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
    
    <style>
        /* --- 導航欄與搜尋排版 --- */
        .navbar { 
            background: #1a5f5f; 
            color: white; 
            position: relative; 
            z-index: 100;
            overflow: visible !important; /* 關鍵：防止切掉下拉選單 */
        }
        .nav-container { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 10px 20px;
            overflow: visible !important;
        }
        .nav-menu { display: flex; list-style: none; gap: 20px; margin: 0; padding: 0; }
        .nav-menu a { text-decoration: none; color: white; font-weight: bold; }

        /* --- 搜尋框區域 --- */
        .search-wrapper { position: relative; overflow: visible !important; }
        #search-input { 
            padding: 8px 15px; 
            border-radius: 20px; 
            border: none; 
            width: 180px; 
            outline: none;
            color: #333;
        }

        /* --- 搜尋結果下拉視窗 (修正白線問題) --- */
        #results-container {
            position: absolute !important;
            top: 45px !important;
            right: 0 !important;
            width: 300px !important;
            background: #ffffff !important; /* 強制背景白色 */
            border: 1px solid #ddd !important;
            border-radius: 8px !important;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3) !important;
            list-style: none !important;
            padding: 0 !important;
            margin: 0 !important;
            z-index: 999999 !important; /* 極高層級 */
            max-height: 400px;
            overflow-y: auto;
            display: none; /* 有結果才顯示 */
        }

        #results-container li { 
            border-bottom: 1px solid #eee !important; 
            margin: 0 !important;
        }
        #results-container li a { 
            display: block !important;
            padding: 12px 15px !important;
            color: #333 !important;
            text-decoration: none !important;
            font-size: 1rem !important;
            text-align: left !important;
            line-height: 1.4 !important;
        }
        #results-container li a:hover { 
            background: #f0f7f7 !important; 
            color: #1a5f5f !important; 
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo" style="font-size: 1.5rem; font-weight: bold;">四月老師</div>
        
        <ul class="nav-menu">
            <li><a href="{{ '/' | relative_url }}">首頁</a></li>
            <li><a href="{{ '/course/' | relative_url }}">課程中心</a></li>
            <li><a href="{{ '/blog/index.html' | relative_url }}">部落格</a></li>
            <li><a href="{{ '/about/' | relative_url }}">關於我們</a></li>
        </ul>

        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="搜尋文章..." autocomplete="off">
            <ul id="results-container"></ul>
        </div>
    </div>
</nav>

<main>
    {{ content }}
</main>

<footer style="text-align: center; padding: 40px 0; background: #f9f9f9; border-top: 1px solid #eee; margin-top: 50px;">
    <p>&copy; 2026 四月老師 - 魔法課程中心</p>
</footer>

<script src="https://unpkg.com/simple-jekyll-search@latest/dest/simple-jekyll-search.min.js"></script>

<script>
    window.onload = function() {
        var searchInput = document.getElementById('search-input');
        var resultsBox = document.getElementById('results-container');

        // 初始化 SimpleJekyllSearch
        var sjs = SimpleJekyllSearch({
            searchInput: searchInput,
            resultsContainer: resultsBox,
            json: '/search.json',
            searchResultTemplate: '<li><a href="{url}">{title}</a></li>',
            noResultsText: '<li style="padding:15px; color:#999;">找不到相關文章</li>',
            success: function() {
                console.log("搜尋資料載入成功");
            }
        });

        // 監聽輸入：控制結果框顯示/隱藏
        searchInput.addEventListener('input', function() {
            if (this.value.trim().length > 0) {
                resultsBox.style.display = 'block';
            } else {
                resultsBox.style.display = 'none';
            }
        });

        // 監聽 Enter 鍵直接跳轉
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                var firstLink = resultsBox.querySelector('a');
                if (firstLink) window.location.href = firstLink.href;
            }
        });

        // 點擊空白處關閉
        document.addEventListener('click', function(e) {
            if (e.target !== searchInput) {
                resultsBox.style.display = 'none';
            }
        });
    };
</script>

</body>
</html>
