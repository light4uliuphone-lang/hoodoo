<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
    <style>
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 10px 20px; }
        .nav-menu { display: flex; list-style: none; gap: 20px; margin: 0; padding: 0; }
        .nav-menu a { text-decoration: none; color: #fff; font-weight: bold; }

        .search-wrapper { position: relative; }
        #search-input { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; width: 160px; outline: none; color: #333; }
        
        /* 強制結果框顯示在最上層 */
        #results-container {
            position: absolute; top: 45px; right: 0; width: 320px; 
            background: white !important; border-radius: 8px; box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            list-style: none; padding: 0; margin: 0; z-index: 99999 !important;
            max-height: 400px; overflow-y: auto; display: none;
        }
        #results-container li { border-bottom: 1px solid #eee; display: block !important; }
        #results-container li a { display: block !important; padding: 15px; color: #333 !important; text-decoration: none !important; }
        #results-container li a:hover { background: #f0f7f7; }
    </style>
</head>
<body>

<nav class="navbar" style="background: #1a5f5f; color: white;">
    <div class="nav-container">
        <div class="logo" style="font-size: 1.5rem; font-weight: bold;">四月老師</div>
        <ul class="nav-menu">
            <li><a href="{{ '/' | relative_url }}">首頁</a></li>
            <li><a href="{{ '/course/' | relative_url }}">課程中心</a></li>
            <li><a href="{{ '/blog/index.html' | relative_url }}">部落格</a></li>
            <li><a href="{{ '/about/' | relative_url }}">關於我們</a></li>
        </ul>
        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="按此搜尋文章..." autocomplete="off">
            <ul id="results-container"></ul>
        </div>
    </div>
</nav>

<main>{{ content }}</main>

<script src="https://cdn.jsdelivr.net/npm/simple-jekyll-search@1.10.0/dest/simple-jekyll-search.min.js"></script>

<script>
    // 確保網頁內容全部載入後才執行搜尋初始化
    window.onload = function() {
        console.log("🔍 搜尋系統啟動中...");

        var searchInput = document.getElementById('search-input');
        var resultsContainer = document.getElementById('results-container');

        if (!searchInput || !resultsContainer) {
            console.error("❌ 找不到搜尋框或結果容器的 ID！");
            return;
        }

        SimpleJekyllSearch({
            searchInput: searchInput,
            resultsContainer: resultsContainer,
            json: '/search.json',
            searchResultTemplate: '<li><a href="{url}">{title}</a></li>',
            noResultsText: '<li style="padding:15px; color:#999;">沒有找到結果</li>',
            success: function() {
                console.log("✅ 成功連線到 search.json 資料庫！");
            }
        });

        // 監聽輸入框，有字就顯示，沒字就隱藏
        searchInput.addEventListener('input', function() {
            if (this.value.trim().length > 0) {
                resultsContainer.style.display = 'block';
            } else {
                resultsContainer.style.display = 'none';
            }
        });

        // 點擊外面自動關閉
        document.addEventListener('click', function(e) {
            if (e.target !== searchInput) {
                resultsContainer.style.display = 'none';
            }
        });
    };
</script>

</body>
</html>
