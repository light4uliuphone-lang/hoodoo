<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
    
    <style>
        /* --- 搜尋框基礎樣式 --- */
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 10px 20px; }
        .nav-menu { display: flex; list-style: none; gap: 20px; margin: 0; padding: 0; }
        .nav-menu a { text-decoration: none; color: #fff; font-weight: bold; }

        .search-wrapper { position: relative; }
        #search-input { 
            padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; 
            width: 160px; outline: none; background: white; color: #333;
        }

        /* --- 搜尋結果視窗 (強制置頂) --- */
        #results-container {
            position: absolute !important; 
            top: 45px !important; 
            right: 0 !important; 
            width: 320px !important; 
            background: #ffffff !important; 
            border-radius: 8px !important; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
            list-style: none !important; 
            padding: 5px 0 !important; 
            margin: 0 !important; 
            z-index: 999999 !important; /* 超高層級 */
            max-height: 400px; 
            overflow-y: auto; 
            display: none; /* 預設隱藏 */
        }
        #results-container li { border-bottom: 1px solid #eee; display: block !important; }
        #results-container li a { 
            display: block !important; 
            padding: 12px 20px !important; 
            color: #333 !important; 
            text-decoration: none !important; 
            font-size: 1rem !important;
            text-align: left !important;
        }
        #results-container li a:hover { background: #f0f7f7 !important; color: #1a5f5f !important; }
    </style>
</head>
<body>

<nav class="navbar" style="background: #1a5f5f; color: white; position: relative; z-index: 1000;">
    <div class="nav-container">
        <div class="logo" style="font-size: 1.5rem; font-weight: bold;">四月老師</div>
        
        <ul class="nav-menu">
            <li><a href="{{ '/' | relative_url }}">首頁</a></li>
            <li><a href="{{ '/course/' | relative_url }}">課程中心</a></li>
            <li><a href="{{ '/blog/index.html' | relative_url }}">部落格</a></li>
            <li><a href="{{ '/about/' | relative_url }}">關於我們</a></li>
        </ul>

        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="搜尋..." autocomplete="off">
            <ul id="results-container"></ul>
        </div>
    </div>
</nav>

<main>{{ content }}</main>

<footer style="text-align: center; padding: 40px 0; border-top: 1px solid #eee; margin-top: 50px; background: #f9f9f9;">
    <p>&copy; 2026 四月老師 - 魔法課程中心</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/simple-jekyll-search@1.10.0/dest/simple-jekyll-search.min.js"></script>

<script>
    window.onload = function() {
        console.log("🚀 搜尋引擎初始化中...");

        var sjs = SimpleJekyllSearch({
            searchInput: document.getElementById('search-input'),
            resultsContainer: document.getElementById('results-container'),
            json: '/search.json',
            searchResultTemplate: '<li><a href="{url}">{title}</a></li>',
            noResultsText: '<li style="padding:15px; color:#999;">找不到結果</li>',
            success: function() {
                console.log("✅ 成功連線到搜尋資料庫！");
            }
        });

        // 監聽打字事件：強制顯示結果框
        var inputField = document.getElementById('search-input');
        var resultsBox = document.getElementById('results-container');

        inputField.addEventListener('keyup', function() {
            if (this.value.trim().length > 0) {
                resultsBox.style.display = 'block';
                console.log("正在搜尋: " + this.value);
            } else {
                resultsBox.style.display = 'none';
            }
        });

        // 按下 Enter 直接跳轉到第一個結果
        inputField.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                var firstResult = resultsBox.querySelector('a');
                if (firstResult) {
                    window.location.href = firstResult.href;
                }
            }
        });

        // 點擊網頁其他地方自動關閉結果框
        document.addEventListener('click', function(e) {
            if (e.target !== inputField) {
                resultsBox.style.display = 'none';
            }
        });
    };
</script>

</body>
</html>
