---
layout: default
---

<style>
    .post-wrapper {
        max-width: 800px;
        margin: 0 auto;
        padding: 40px 20px;
        font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
    }
    .post-header {
        text-align: center;
        margin-bottom: 40px;
    }
    .post-title {
        font-size: 2.2rem;
        color: #1a5f5f;
        margin-bottom: 10px;
        line-height: 1.3;
    }
    .post-date {
        color: #888;
        font-size: 0.9rem;
    }
    /* 這裡負責修復你的內文排版 */
    .post-main-content {
        line-height: 1.8;
        font-size: 1.15rem;
        color: #333;
        margin: 30px 0;
    }
    .post-main-content p {
        margin-bottom: 1.6rem; /* 讓段落之間有呼吸感 */
    }
    .post-main-content h2, .post-main-content h3 {
        color: #1a5f5f;
        margin-top: 2rem;
        margin-bottom: 1rem;
    }
    .post-main-content ul, .post-main-content ol {
        margin-bottom: 1.6rem;
        padding-left: 1.5rem;
    }
    .post-main-content li {
        margin-bottom: 0.5rem;
    }
    .post-main-content strong {
        color: #000;
        background: linear-gradient(transparent 70%, #fff3b0 0); /* 幫重點加一點底色 */
    }
</style>

<article class="post-wrapper">
    <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <div class="post-date">📅 {{ page.date | date: "%Y-%m-%d" }}</div>
    </header>

    <div style="margin-bottom: 40px;">
        {% include my-self-ad.html %}
    </div>

    <div class="post-main-content">

{{ content }}

    </div>

    <div style="margin-top: 40px;">
        {% include google-ad-bottom.html %}
    </div>

    <nav style="margin-top: 50px; display: flex; justify-content: space-between; border-top: 1px solid #eee; padding-top: 20px;">
        {% if page.previous %}
            <a href="{{ page.previous.url }}" style="color: #1a5f5f; text-decoration: none;">← {{ page.previous.title }}</a>
        {% else %}
            <span></span>
        {% endif %}
        {% if page.next %}
            <a href="{{ page.next.url }}" style="color: #1a5f5f; text-decoration: none;">{{ page.next.title }} →</a>
        {% endif %}
    </nav>
</article>
