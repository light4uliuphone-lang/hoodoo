<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1250" font-family="'Noto Serif TC','Source Han Serif TC','PMingLiU',serif">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="baseGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9973f" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#c9973f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 底 -->
  <rect x="0" y="0" width="800" height="1250" rx="24" fill="#1b1410"/>

  <!-- 星圖背景圓環 -->
  <circle cx="400" cy="1110" r="210" fill="none" stroke="#c9973f" stroke-opacity=".08" stroke-width="1.5"/>
  <circle cx="400" cy="1110" r="340" fill="none" stroke="#c9973f" stroke-opacity=".06" stroke-width="1"/>
  <circle cx="400" cy="640" r="470" fill="none" stroke="#c9973f" stroke-opacity=".05" stroke-width="1"/>

  <!-- 散落星點 -->
  <g fill="#e6cfa0">
    <circle cx="120" cy="330" r="2" opacity=".4"/>
    <circle cx="690" cy="470" r="2.5" opacity=".3"/>
    <circle cx="150" cy="740" r="2" opacity=".35"/>
    <circle cx="660" cy="880" r="2" opacity=".3"/>
    <circle cx="90"  cy="1010" r="2.5" opacity=".3"/>
    <circle cx="720" cy="150" r="2" opacity=".35"/>
    <circle cx="270" cy="95"  r="1.8" opacity=".3"/>
    <circle cx="560" cy="990" r="1.8" opacity=".35"/>
  </g>

  <!-- 標題 -->
  <text x="400" y="62" text-anchor="middle" fill="#c9973f" font-size="26" letter-spacing="10">胡督魔法系列・學習路徑</text>

  <!-- 選修列（頂端） -->
  <text x="400" y="112" text-anchor="middle" fill="#8c6a3a" font-size="15" letter-spacing="8">─ 選 修 課 程 ─</text>

  <!-- 選修連接虛線（自主幹頂端分出） -->
  <g stroke="#c9973f" stroke-width="1.5" stroke-dasharray="5 6" fill="none" opacity=".7">
    <path d="M 400 300 C 400 260, 240 250, 190 218"/>
    <path d="M 400 300 L 400 198"/>
    <path d="M 400 300 C 400 260, 560 250, 610 218"/>
  </g>

  <!-- 選修節點與標籤 -->
  <g>
    <text x="190" y="168" text-anchor="middle" fill="#e6cfa0" font-size="18">魔法油配方解析</text>
    <circle cx="190" cy="205" r="13" fill="none" stroke="#c9973f" stroke-width="1.5" stroke-dasharray="4 4"/>
    <circle cx="190" cy="205" r="4.5" fill="#c9973f"/>

    <text x="400" y="152" text-anchor="middle" fill="#e6cfa0" font-size="18">藥草行星魔法</text>
    <circle cx="400" cy="185" r="13" fill="none" stroke="#c9973f" stroke-width="1.5" stroke-dasharray="4 4"/>
    <circle cx="400" cy="185" r="4.5" fill="#c9973f"/>

    <text x="610" y="168" text-anchor="middle" fill="#e6cfa0" font-size="18">魔法蠟燭課</text>
    <circle cx="610" cy="205" r="13" fill="none" stroke="#c9973f" stroke-width="1.5" stroke-dasharray="4 4"/>
    <circle cx="610" cy="205" r="4.5" fill="#c9973f"/>
  </g>

  <!-- 主幹 -->
  <line x1="400" y1="1040" x2="400" y2="300" stroke="#c9973f" stroke-width="2.5" opacity=".85"/>

  <!-- 五大單元節點（由下而上） -->
  <!-- 單元一（左） -->
  <circle cx="400" cy="940" r="15" fill="#1b1410" stroke="#c9973f" stroke-width="2"/>
  <circle cx="400" cy="940" r="5.5" fill="#c9973f"/>
  <text x="360" y="948" text-anchor="end" fill="#f4ecdd" font-size="21">【單元一】淨化療癒篇</text>

  <!-- 單元二（右） -->
  <circle cx="400" cy="810" r="15" fill="#1b1410" stroke="#c9973f" stroke-width="2"/>
  <circle cx="400" cy="810" r="5.5" fill="#c9973f"/>
  <text x="440" y="818" text-anchor="start" fill="#f4ecdd" font-size="21">【單元二】反轉詛咒篇</text>

  <!-- 單元三（左） -->
  <circle cx="400" cy="680" r="15" fill="#1b1410" stroke="#c9973f" stroke-width="2"/>
  <circle cx="400" cy="680" r="5.5" fill="#c9973f"/>
  <text x="360" y="688" text-anchor="end" fill="#f4ecdd" font-size="21">【單元三】金錢魔法與祭壇</text>

  <!-- 單元四（右） -->
  <circle cx="400" cy="550" r="15" fill="#1b1410" stroke="#c9973f" stroke-width="2"/>
  <circle cx="400" cy="550" r="5.5" fill="#c9973f"/>
  <text x="440" y="558" text-anchor="start" fill="#f4ecdd" font-size="21">【單元四】愛情魔法篇</text>

  <!-- 單元五（左） -->
  <circle cx="400" cy="420" r="15" fill="#1b1410" stroke="#c9973f" stroke-width="2"/>
  <circle cx="400" cy="420" r="5.5" fill="#c9973f"/>
  <text x="360" y="428" text-anchor="end" fill="#f4ecdd" font-size="21">【單元五】關係破壞者</text>

  <!-- 基礎課節點（發光） -->
  <circle cx="400" cy="1110" r="150" fill="url(#baseGlow)"/>
  <g filter="url(#glow)">
    <circle cx="400" cy="1110" r="66" fill="#2a1f16" stroke="#c9973f" stroke-width="2.5"/>
  </g>
  <circle cx="400" cy="1110" r="55" fill="none" stroke="#c9973f" stroke-width="1" opacity=".6"/>
  <text x="400" y="1102" text-anchor="middle" fill="#f4ecdd" font-size="22">藥草魔法師</text>
  <text x="400" y="1132" text-anchor="middle" fill="#f4ecdd" font-size="22">基礎課程</text>

  <!-- 你在這裡徽章 -->
  <rect x="322" y="1192" width="156" height="36" rx="18" fill="#8c3b2e"/>
  <text x="400" y="1216" text-anchor="middle" fill="#f4ecdd" font-size="17" letter-spacing="2">▶ 你在這裡</text>
</svg>
