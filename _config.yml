# 網站基本資訊
title: 靈火巫境
description: 策略魔法、藥草魔法與胡督傳統課程中心
email: herbmagic@hotmail.com.tw
url: "https://hoodoo.pro"
baseurl: ""

# --- 核心修正：強制包含靜態檔案 ---
include:
  - ads.txt
  - CNAME
  - sitemap.xml

# 渲染與效能設定
markdown: kramdown
highlighter: rouge
future: true
encoding: utf-8
timezone: Asia/Taipei

# 文章網址格式
permalink: /blog/:year/:month/:day/:title/

# 分頁設定
paginate: 20
paginate_path: "/blog/page:num/"

# --- 外掛程式 (Plugins) ---
plugins:
  - jekyll-paginate

# 排除不需要編譯的檔案
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
