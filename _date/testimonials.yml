# =====================================================
# 學員見證資料庫
# 新增回饋：複製一組格式貼在最後即可，所有頁面自動更新
#
# tags 說明：
#   - 課程代號（如 angel-sigil）：該課程頁會優先顯示
#   - general：通用型回饋（稱讚老師教學、整體體驗），
#     任何課程頁在專屬回饋不足時會遞補顯示
#   - 一則回饋可以有多個標籤
#
# 目前使用中的課程標籤（可自行增改，需與頁面引用一致）：
#   star-lamp      天國星燈
#   angel-sigil    天使符印
#   counter-magic  反擊魔法
#   purification   淨化魔法
#   hoodoo-00      藥草魔法師基礎課程
# =====================================================

- text: "一樣是做了半年多的榮耀之燈。木星帶來的幫助很廣泛——除了會帶來新的個案以外，熟客也回來了，也讓我產生想要多寫文章、多發文章的想法。讓人審視目前手上的資源，也提供新的視野，可以說是提供了戰略視野的軍師，讓你看清楚自己的手牌，並且給你如何前進的新觀點。膨脹的性質整個讓格局放大、視野寬廣，這就是我體會到的木星的啟示及祝福。"
  name: "學員回饋"
  course: "天國星燈"
  tags: [star-lamp]

- text: "我女兒考高中，原本覺得 6.6 積分不會有學校念，結果我畫了一張天使符印放枕頭下。今天放榜，上復興商工美工科，他超開心的，因為不用重考了。"
  name: "學員回饋"
  course: "天使符印"
  tags: [angel-sigil]

- text: "今年 5 月，因朋友常年被惡鄰居困擾，所以贈與她種子方塊和「反彈鄰居惡意能量」的天使護符，讓她貼在門口。當下雖然沒有立刻看到效果，但今天再度聯絡上時，才知她已搬離了是非之地，我朋友對這樣的結果滿開心的。因為覺得符印的任務已經完成，有交代她去化掉。第一次正式使用符印達到效果，感謝老師的課程。"
  name: "學員回饋"
  course: "天使符印"
  tags: [angel-sigil]

- text: "天使符印課程是不同於藥草魔法的系統，其實還滿有趣且實戰實用，現學現用，在任何情況下都可以依照需求繪製符印來達成自己的願望或發動特殊效果。我個人是運用在日常巫師活動或行動中，看有甚麼需要就拿出來跟各式各樣的魔法結合並發動，根本就是日常必用符印之一！學了之後可以自行鑽研，繪製自己滿意的作品，在那一筆一劃設計中會有滿滿心意及力量貫徹其中。"
  name: "學員回饋"
  course: "天使符印"
  tags: [angel-sigil]

- text: "三月中上完課回來後，我就在水星日水星時畫了一張「羽球技術進步」的符印。大約一個星期左右，一位羽球打得很好的同事忽然與我分享一個羽球教練的網站，並且也較願意與程度差他很多的我搭檔。一、兩星期以後，我「拖累」隊友的情形就少很多，同事也都說我進步了，真的很開心！我很喜歡老師說的「尊重魔法神聖的秩序」——謹慎的許願，在許願之後慢慢地去感受生活之中的轉變，自己也慢慢地朝目標前進，再加上魔法的協助，真的會心想事成。"
  name: "學員回饋"
  course: "天使符印"
  tags: [angel-sigil, general]

- text: "最近因為搬家錢有點緊，用占星骰子看的狀況也不太好，然後再骰一次看要怎麼解決，就說要我拿出行動力。於是我就拿出行動力畫了天使符印，問題就突然解決了 XD"
  name: "學員回饋"
  course: "天使符印"
  tags: [angel-sigil]

- text: "在上完淨化魔法及反擊魔法後，我幾乎天天會進行煙燻淨化及反擊魔法前面幾章的練習，消除邪惡及詛咒的影響。昨天在靈擺療癒課時，檢測自己身上的負面靈體及詛咒數量，我都超少的耶！可見平時淨化的練習真的有效。"
  name: "學員回饋"
  course: "淨化魔法・反擊魔法"
  tags: [counter-magic, purification]

- text: "我來給金錢魔法課的回饋，有個朋友使用完金錢水拖地後，獲得 3000 元零用錢。"
  name: "學員回饋"
  course: "金錢魔法與祭壇"
  tags: [hoodoo-03]

- text: "突然想到還有一個有趣的事，我那時幫朋友架設了金錢祭壇，但某天祭壇裡的藥草包發霉了，我就撤掉祭壇，並請他注意財務狀況。後來有人找他投資，他拒絕掉，結果之後聽說那個投資機會有點問題，還好沒有答應。"
  name: "學員回饋"
  course: "金錢魔法與祭壇"
  tags: [hoodoo-03]

- text: "做反轉詛咒黑蠟燭的祈禱，原本發生了一些厄運，但洗了淨化沐浴到今天是第 10 天，原本令我困擾的一些小事情或是一些流言中傷就自己消失無蹤了～果然淨化對魔法工作很重要，深深的體會到了。"
  name: "學員回饋"
  course: "反轉詛咒篇"
  tags: [hoodoo-02, hoodoo-01]

- text: "用老師在淨化魔法中的配方做了沐浴包，每次洗完都覺得卸下一身重擔，也有朋友洗完睡眠品質變好。"
  name: "學員回饋"
  course: "淨化療癒篇"
  tags: [hoodoo-01]

- text: "看到最近淨化魔法又要再開，特別整理一下實作了一年多淨化魔法的感想。課程內容相當豐富，不僅教了淨化沐浴包的製作、地板洗劑，也有煙燻淨化法、蛋清理淨化法，其中蛋清理真是太厲害了，還包含了占卜的技巧。我幾乎週週進行煙燻及地板洗劑的淨化，發覺法術都更有效果了，也時常能度過危機。突然發覺淨化真的相當重要，所謂的消災解厄就是淨化技術的精髓呀！想要好運，務必先將厄運清理，要趨吉得先避凶才行啊！超級推薦這堂課。"
  name: "學員回饋"
  course: "淨化療癒篇"
  tags: [hoodoo-01]

- text: "不得不說淨化課真的是我上過最實用的能量相關課程之一了。聖水、檸檬淨化、煙燻淨化都超好用的。"
  name: "學員回饋"
  course: "淨化療癒篇"
  tags: [hoodoo-01]

- text: "來給個藥草初階的回饋，我去年 2 月來了個小主管，他非常的兇，有一次被他刁難到回家痛苦，做了金錢淨化的咒瓶，許願淨化事業上的障礙，然後去年年底他被釣到其他部門了。原來願望實現需要點時間。"
  name: "學員回饋"
  course: "藥草魔法師基礎課程"
  tags: [hoodoo-00]

- text: "自從上完了藥草魔法初階課程有製作淨化咒罐，上課後那陣子幾乎一段時間都會充電，但離職之後就沒有再充電使用。最近因為換了工作，工作環境容易產生病氣，有點影響我（因為本身也敏感體質），所以某一天禮拜日果斷重新連結重新充電，點完蠟燭真的開始清理，但過後好很多！謝謝藥草初階課程有製作淨化咒罐，能量很穩定真的很喜歡！再次感謝四月老師。"
  name: "學員回饋"
  course: "藥草魔法師基礎課程"
  tags: [hoodoo-00, general]

- text: "我今天早上清了一個預備當祭壇的地方，是我房間的小陽台，物理清理完、酒精消毒，最後聖水擦一擦。睡前關心一下我媽媽，她在看股市，談到錢有關的話題，我就請她幫我輕輕搓一搓星期六做的咒袋、晃一晃咒瓶，就去睡了。睡醒她跟我說：「欸你那個藥草好香喔，我跟你說我股市大賺乁」"
  name: "學員回饋"
  course: "藥草魔法師基礎課程"
  tags: [hoodoo-00]

- text: "之前愛情魔法課，其中有提到蜂蜜罐魔法的原型，我後來實作後真的很有效的能快速改善和他人的關係。並且其中吸引愛情配方，目前用起來個案都說能明顯感受到自己魅力變強，追求者變多，真是太厲害了。"
  name: "學員回饋"
  course: "愛情魔法篇"
  tags: [hoodoo-04]

- text: "來給愛情魔法課程回饋，有一位婚姻原本岌岌可危的朋友，使用了復合油之後，婚姻狀況得以改善了。不過確實如老師所說，復合僅能保住婚姻關係，感情似乎需要再用其他方法改善，並且沒有婚姻關係的前提下，復合幾乎不可能成功。"
  name: "學員回饋"
  course: "愛情魔法篇"
  tags: [hoodoo-04]

- text: "跟老師感謝，我官司一個贏了，另兩個對方知道自己會輸然後撤訴，希望那怪人不要再來了。因為律師說他就是濫訴，有可能捲土重來，我有做了冰箱咒術，希望有幫助。感謝那時老師緊急幫我寄出蠟燭還有護符。"
  name: "學員回饋"
  course: "關係破壞者"
  tags: [hoodoo-05]

- text: "6/16 我架設了金錢祭壇後，這半個月的副業收入多了 5000 元，通常都是客人自己額外多給小費或是自己增加消費。以最近的非必要消費下降來說，我居然算是業績好的～"
  name: "學員回饋"
  course: "金錢魔法與祭壇"
  tags: [hoodoo-03]
